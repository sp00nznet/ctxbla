# Switch table definitions for Crazy Taxi (XBLA)
# Generated by scripts/extract_switch_tables.py, then manually verified.
#
# Each entry defines a jump table used by a switch statement in the PPC code.
# XenonRecomp needs these to correctly translate indirect branches.
#
# Format:
#   [[switch_table]]
#   address = 0x82XXXXXX    # Address of the branch instruction
#   table = 0x82XXXXXX      # Address of the jump table data
#   count = N               # Number of entries in the table
#   base = 0x82XXXXXX       # Base address for relative offsets (optional)

# TODO: Run extract_switch_tables.py on the Crazy Taxi PE to populate this file.
# py scripts/extract_switch_tables.py extracted/default_pe.exe > config/crazytaxi_switch_tables.toml
