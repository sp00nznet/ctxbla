# Crazy Taxi (XBLA) - ReXGlue Configuration

project_name = "crazytaxi"
file_path = "../extracted/default.xex"
out_directory_path = "../generated"

# Code generation options (conservative - all disabled for initial pass)
skip_lr = false
skip_msr = false
ctr_as_local = false
xer_as_local = false
cr_as_local = false
reserved_as_local = false
non_argument_as_local = false
non_volatile_as_local = false
generate_exception_handlers = false

[analysis]
max_jump_extension = 65536

# Manual function overrides for cross-function branches
# These are tail-call targets that rexglue's analysis doesn't detect as function starts
[functions]
0x821092A0 = { end = 0x821092BC }  # tail call from 0x821002EC
0x82108770 = { end = 0x82108788 }  # tail call from 0x82100958
